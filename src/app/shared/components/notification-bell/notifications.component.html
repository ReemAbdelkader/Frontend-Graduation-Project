<div class="bell-wrap">
  <button class="icon-btn" (click)="toggle()" aria-label="Notifications">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/>
      <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>
    </svg>
    @if (unreadCount > 0) {
      <span class="badge">{{ unreadCount }}</span>
    }
  </button>

  @if (open()) {
    <div class="dropdown" (click)="$event.stopPropagation()">
      <div class="dropdown-header">
        <p class="title">Notifications</p>
        <button class="close-btn" (click)="close()" aria-label="Close">×</button>
      </div>
      <ul class="notif-list">
        @if (notifications().length === 0) {
          <li class="notif-item" style="color: #666; justify-content: center;">No notifications yet</li>
        }
        @for (n of notifications(); track n.id) {
          <li class="notif-item" [class.unread]="n.unread">
            <div class="notif-dot"></div>
            <div class="notif-body">
              <p class="notif-title">{{ n.title }}</p>
              <p class="notif-text">{{ n.body }}</p>
              <p class="notif-time">{{ n.time }}</p>
            </div>
          </li>
        }
      </ul>
    </div>
  }
</div>
