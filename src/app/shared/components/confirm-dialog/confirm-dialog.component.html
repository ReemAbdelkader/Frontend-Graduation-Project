@if (open) {
  <div class="overlay" (click)="cancel.emit()">
    <div class="dialog" (click)="$event.stopPropagation()">
      @if (success) {
        <div class="success-icon-container">
          <div class="success-circle">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="success-icon">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </div>
        </div>
      }

      <h3 class="title" [class.text-center]="success">{{ title }}</h3>
      <p class="desc" [class.text-center]="success">{{ description }}</p>

      @if (previewImageUrl) {
        <div class="preview-container">
          <img [src]="previewImageUrl" class="snapshot-preview" alt="Design Snapshot Preview" />
        </div>
      }

      @if (showCommunitySection) {
        <div class="divider"></div>
        <div class="community-section">
          <h4 class="community-title">Publish to Community</h4>
          <p class="community-subtitle">Would you like to publish your design in our community?</p>
          <p class="community-desc">
            "Share your creativity with other designers and let the community discover your work."
          </p>
        </div>
      }

      <div class="actions" [class.center-actions]="success">
        <button class="btn btn-ghost" (click)="cancel.emit()">{{ cancelLabel }}</button>
        <button
          class="btn"
          [class.btn-destructive]="destructive"
          [class.btn-primary]="!destructive"
          [disabled]="confirmLoading"
          (click)="!confirmLoading && confirm.emit()"
        >
          @if (confirmLoading) {
            <span class="btn-spinner"></span>
            Publishing...
          } @else {
            {{ confirmLabel }}
          }
        </button>
      </div>
    </div>
  </div>
}
