<header class="app-nav">
  <div class="nav-inner">
    <a class="brand" routerLink="/">
      <img [src]="logo" alt="Atelier" class="logo" />
      <span class="brand-name">Atelier</span>
      @if (isAdmin()) {
        <span class="role-chip admin-chip">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          Admin
        </span>
      } @else if (user()) {
        <span class="role-chip user-chip">{{ user()!.name }}</span>
      }
    </a>

    <nav class="links">
      @for (link of links; track link.to) {
        <a
          [routerLink]="link.to"
          routerLinkActive="active"
          class="nav-link"
        >
          {{ link.label }}
        </a>
      }
    </nav>

    <div class="actions">
      @if (isAdmin()) {
        <a
          [routerLink]="targetForControl()"
          routerLinkActive="active"
          class="control-center-btn"
          [attr.aria-pressed]="isControlCenterActive()"
        >
          {{ controlLabel() }}
        </a>
      } @if (canSwitchToPrinter()) {
        <button class="control-center-btn" (click)="goToPrinter()">
          Printer view
        </button>
      }
      <app-notification-bell />

      <app-cart-dropdown />

      @if (user()) {
        <a routerLink="/profile" class="avatar" aria-label="Profile">{{ initials }}</a>
        <button class="icon-btn" (click)="openLogout()" aria-label="Sign out" title="Sign out">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      } @else {
        <a routerLink="/auth" class="signin-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          Sign in
        </a>
      }
    </div>
  </div>

  <app-logout-dialog
    [open]="askLogout()"
    (closed)="closeLogout()"
  />
</header>
