<div class="design-editor-shell">
  <div class="canvas-toolbar">
    <button type="button" class="toolbar-btn primary" (click)="addText()">
      Add Text
    </button>
    <button type="button" class="toolbar-btn" (click)="triggerImageUpload()">
      Upload Image
    </button>
    <button
      type="button"
      class="toolbar-btn"
      (click)="editSelectedText()"
      [disabled]="!hasSelection"
    >
      Edit
    </button>
    <button
      type="button"
      class="toolbar-btn danger"
      (click)="deleteSelectedObject()"
      [disabled]="!hasSelection"
    >
      Delete
    </button>

    <label class="toolbar-control text-input-wrap">
      <span>Text</span>
      <input
        type="text"
        class="text-input"
        [value]="selectedTextValue"
        [disabled]="!hasSelection"
        (input)="updateTextValue($any($event.target).value)"
        placeholder="Type your text"
      />
    </label>

    <label class="toolbar-control">
      <span>Size</span>
      <input
        type="range"
        min="16"
        max="96"
        [value]="fontSize"
        [disabled]="!hasSelection"
        (input)="updateFontSize($any($event.target).value)"
      />
      <span class="value-pill">{{ fontSize }}</span>
    </label>

    <label class="toolbar-control">
      <span>Font</span>
      <select
        [value]="fontFamily"
        [disabled]="!hasSelection"
        (change)="updateFontFamily($any($event.target).value)"
      >
        @for (family of fontFamilies; track family) {
          <option [value]="family">{{ family }}</option>
        }
      </select>
    </label>

    <label class="toolbar-control color-control">
      <span>Color</span>
      <input
        type="color"
        [value]="textColor"
        [disabled]="!hasSelection"
        (input)="updateTextColor($any($event.target).value)"
      />
    </label>
  </div>

  <input
    #imageInput
    type="file"
    accept="image/png,image/jpeg,image/webp,image/svg+xml"
    hidden
    (change)="handleImageSelection($event)"
  />

  <div class="design-canvas-shell">
    <img
      #previewImage
      [src]="imageUrl"
      [alt]="alt"
      class="preview-image"
      (load)="onImageLoaded()"
    />
    <div #canvasHost class="fabric-canvas-host">
      <canvas #fabricCanvas class="fabric-canvas"></canvas>
    </div>
  </div>
</div>
