<div class="design-editor-shell">
  <!-- Hidden file input: used by triggerImageUpload() called from the sidebar -->
  <input
    #imageInput
    type="file"
    accept="image/png,image/jpeg,image/webp,image/svg+xml"
    hidden
    (change)="handleImageSelection($event)"
  />

  <div class="design-canvas-shell">
    <img
      #previewImage
      [src]="imageUrl"
      [alt]="alt"
      class="preview-image"
      crossorigin="anonymous"
      (load)="onImageLoaded()"
    />
    <div #canvasHost class="fabric-canvas-host">
      <canvas #fabricCanvas class="fabric-canvas"></canvas>
    </div>
  </div>
</div>
