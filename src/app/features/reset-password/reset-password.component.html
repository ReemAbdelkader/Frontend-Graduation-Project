<div class="rp-page">
  <div class="rp-card">
    <a routerLink="/" class="brand">
      <img [src]="logo" alt="Wearly" class="logo" />
      <span class="brand-name">Wearly</span>
    </a>

    <h1 class="title">Set a new password</h1>
    <p class="sub">Choose a strong password for your Wearly account.</p>

    <form class="form" (ngSubmit)="submit(); $event.preventDefault()">
      <label class="field">
        <span class="label">Email</span>
        <input
          type="email"
          placeholder="you@atelier.com"
          [ngModel]="email()"
          (ngModelChange)="setEmail($event)"
          name="email"
          [class.error-input]="!!error()"
          autocomplete="email"
        />
      </label>

      <label class="field">
        <span class="label">New password</span>
        <div class="password-wrap">
          <input
            [type]="showPassword() ? 'text' : 'password'"
            placeholder="At least 6 characters"
            [ngModel]="password()"
            (ngModelChange)="setPassword($event)"
            name="password"
            [class.error-input]="!!error()"
            autocomplete="new-password"
          />
          <button type="button" class="toggle-btn" (click)="toggleShowPassword()" [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'">
            @if (showPassword()) {
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></svg>
            } @else {
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
            }
          </button>
        </div>
      </label>

      @if (error()) {
        <p class="error-text">{{ error() }}</p>
      }

      <button type="submit" class="submit-btn" [disabled]="loading()">
        @if (loading()) {
          <span class="spinner"></span> Resetting…
        } @else {
          Reset password
        }
      </button>
    </form>

    <a routerLink="/auth" class="back-link">← Back to login</a>
  </div>
</div>
