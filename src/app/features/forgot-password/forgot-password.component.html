<div class="fp-page">
  <div class="fp-card">
    <a routerLink="/" class="brand">
      <img [src]="logo" alt="Atelier" class="logo" />
      <span class="brand-name">Atelier</span>
    </a>

    <h1 class="title">Forgot your password?</h1>
    <p class="sub">Enter your email and we'll send you a reset link.</p>

    <form class="form" (ngSubmit)="submit(); $event.preventDefault()">
      <label class="field">
        <span class="label">Email</span>
        <input
          type="email"
          placeholder="you@atelier.com"
          [ngModel]="email()"
          (ngModelChange)="setEmail($event)"
          name="email"
          [class.error-input]="!!error()"
          autocomplete="email"
        />
      </label>

      @if (error()) {
        <p class="error-text">{{ error() }}</p>
      }

      @if (successMessage()) {
        <p class="success-text">{{ successMessage() }}</p>
      }

      @if (!requestSent()) {
        <button type="submit" class="submit-btn" [disabled]="loading()">
          @if (loading()) {
            <span class="spinner"></span> Sending...
          } @else {
            Send reset link
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          }
        </button>
      } @else {
        <button type="button" class="submit-btn" [disabled]="loading() || !canResend()" (click)="resendEmail()">
          @if (loading()) {
            <span class="spinner"></span> Sending...
          } @else if (!canResend()) {
            Resend in {{ resendCountdown() }}s
          } @else {
            Resend email
          }
        </button>
      }
    </form>

    <a routerLink="/auth" class="back-link">← Back to login</a>
  </div>
</div>
